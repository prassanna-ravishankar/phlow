name: Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: "3.11"

    - name: Install dependencies
      run: |
        uv sync --extra fastapi --extra rbac --extra redis --extra monitoring --extra examples --dev

    - name: Check documentation links
      run: |
        python -c "
        import os

        readme_exists = os.path.exists('README.md')
        docs_dir_exists = os.path.exists('docs/')
        examples_exists = os.path.exists('examples/')

        print(f'✅ README.md exists: {readme_exists}')
        print(f'✅ docs/ exists: {docs_dir_exists}')
        print(f'✅ examples/ exists: {examples_exists}')

        if not all([readme_exists, docs_dir_exists, examples_exists]):
            exit(1)
        "

    - name: Validate examples comprehensively
      run: |
        uv run task validate-examples-ci

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: "3.11"

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Build docs
      run: uv run mkdocs build

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
